<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Screen Time Buddy</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <img src="../../assets/icons/icon48.png" alt="Screen Time Buddy" class="logo-icon">
      <span class="header-title">Screen Time Buddy</span>
    </div>
    <div class="header-right">
      <div class="coin-badge">
        <img src="../../assets/icons/coin.svg" alt="coins" class="coin-icon">
        <span id="coinCount">0</span>
      </div>
      <div class="streak-badge" id="streakBadge">
        <span class="streak-fire">&#x1F525;</span>
        <span id="streakCount">0</span>
      </div>
    </div>
  </div>

  <!-- Character Ring Section -->
  <div class="ring-section">
    <div class="ring-container" id="ringContainer">
      <svg class="usage-ring" viewBox="0 0 120 120">
        <circle class="ring-bg" cx="60" cy="60" r="52" />
        <circle class="ring-progress" id="ringProgress" cx="60" cy="60" r="52"
          stroke-dasharray="0 327" />
      </svg>
      <div class="ring-character" id="ringCharacter"></div>
    </div>
    <div class="ring-stats">
      <div class="total-time" id="totalTimeUsed">0m</div>
      <div class="goal-label">of <span id="goalHours">3h</span> goal</div>
    </div>
    <div class="character-selector" id="characterSelector">
      <button class="char-btn" data-char="eagle" title="Eagle: 1.5h goal, 4 coins/day">
        <img src="../../assets/characters/eagle.svg" alt="Eagle">
      </button>
      <button class="char-btn active" data-char="fox" title="Fox: 3h goal, 3 coins/day">
        <img src="../../assets/characters/fox.svg" alt="Fox">
      </button>
      <button class="char-btn" data-char="panda" title="Panda: 4h goal, 2 coins/day">
        <img src="../../assets/characters/panda.svg" alt="Panda">
      </button>
      <button class="char-btn" data-char="sloth" title="Sloth: 5h goal, 1 coin/day">
        <img src="../../assets/characters/sloth.svg" alt="Sloth">
      </button>
    </div>
  </div>

  <!-- Add Site -->
  <div class="section">
    <button class="add-btn" id="showAddForm">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M12 5V19M5 12H19" stroke="#A4FF80" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <span>Add Website Limit</span>
      <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M9 18L15 12L9 6" stroke="#8E8E93" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="add-form" id="addForm">
      <div class="form-group">
        <label>Website</label>
        <input type="text" id="siteInput" placeholder="e.g. youtube.com" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Daily Time Limit</label>
        <div class="time-pills">
          <button class="pill" data-time="15">15m</button>
          <button class="pill" data-time="30">30m</button>
          <button class="pill active" data-time="60">1h</button>
          <button class="pill" data-time="120">2h</button>
          <button class="pill" data-time="180">3h</button>
        </div>
        <div class="add-time-picker" id="addTimePicker">
          <div class="time-picker-col">
            <button class="picker-arrow up" id="addHoursUp">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M18 15L12 9L6 15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
            </button>
            <div class="picker-value" id="addHours">1</div>
            <button class="picker-arrow down" id="addHoursDown">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
            </button>
            <div class="picker-label">hours</div>
          </div>
          <div class="picker-separator">:</div>
          <div class="time-picker-col">
            <button class="picker-arrow up" id="addMinsUp">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M18 15L12 9L6 15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
            </button>
            <div class="picker-value" id="addMins">0</div>
            <button class="picker-arrow down" id="addMinsDown">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
            </button>
            <div class="picker-label">mins</div>
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-ghost" id="cancelAdd">Cancel</button>
        <button class="btn-primary" id="confirmAdd">Add Limit</button>
      </div>
    </div>
  </div>

  <!-- Sites List -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Your Limits</span>
      <span class="site-count" id="siteCount">0 sites</span>
    </div>
    <div class="sites-list" id="sitesList">
      <div class="empty-state">No sites added yet. Add a website above to start.</div>
    </div>
  </div>

  <!-- Time Remaining Circles -->
  <div class="section" id="timeSection" style="display:none;">
    <div class="section-header">
      <span class="section-title">Time Remaining</span>
    </div>
    <div class="time-grid" id="timeGrid"></div>
  </div>

  <!-- Today's Plan -->
  <div class="section" id="planSection">
    <div class="section-header">
      <span class="section-title">Today's Plan</span>
      <span class="task-progress" id="taskProgress">0/0</span>
    </div>
    <div class="task-list" id="taskList">
      <div class="empty-state task-empty">No tasks yet. Add one to stay focused.</div>
    </div>
    <button class="add-task-btn" id="showTaskForm">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M12 5V19M5 12H19" stroke="#A4FF80" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      Add Task
    </button>
    <div class="task-form" id="taskForm">
      <input type="text" id="taskInput" placeholder="What do you need to do?" autocomplete="off">
      <div class="task-duration-pills">
        <button class="duration-pill active" data-dur="15">15m</button>
        <button class="duration-pill" data-dur="30">30m</button>
        <button class="duration-pill" data-dur="45">45m</button>
        <button class="duration-pill" data-dur="60">60m</button>
      </div>
      <div class="task-form-actions">
        <button class="btn-ghost btn-sm" id="cancelTask">Cancel</button>
        <button class="btn-primary btn-sm" id="confirmTask">Add</button>
      </div>
    </div>
    <div class="task-progress-bar" id="taskProgressBar">
      <div class="task-progress-fill" id="taskProgressFill"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="#" id="settingsLink">Settings</a>
    <span class="footer-divider">|</span>
    <a href="#" id="upgradeLink" class="upgrade-link">Upgrade to Pro</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>

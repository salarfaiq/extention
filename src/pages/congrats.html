<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Screen Time Buddy — Great Choice!</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="congrats.css">
</head>
<body>
  <div class="congrats-page">
    <!-- Animated Checkmark -->
    <div class="check-container" id="checkContainer">
      <svg class="check-svg" viewBox="0 0 100 100">
        <circle class="check-circle" cx="50" cy="50" r="45" />
        <path class="check-mark" d="M30 50 L45 65 L72 38" />
      </svg>
    </div>

    <!-- Congrats Message -->
    <h1 class="congrats-title" id="congratsTitle">Great choice!</h1>
    <p class="congrats-message" id="congratsMessage">You chose wisely. The rest of your day just got better.</p>

    <!-- Coins Earned -->
    <div class="coins-earned" id="coinsEarned">
      <img src="../../assets/icons/coin.svg" alt="" class="earned-coin-icon">
      <span class="earned-amount" id="earnedAmount">+1</span>
      <span class="earned-label">coins earned</span>
    </div>

    <!-- Streak Badge -->
    <div class="streak-safe" id="streakSafe">
      <span class="streak-icon">&#x1F525;</span>
      <span>Streak: SAFE</span>
    </div>

    <!-- Actions -->
    <button class="cta-primary" id="backToBrowsing">Back to browsing</button>
    <a class="tasks-link" id="checkTasks" href="#">Check your tasks</a>

    <!-- Auto redirect notice -->
    <p class="auto-redirect" id="autoRedirect">Redirecting in <span id="redirectCountdown">8</span>s...</p>
  </div>

  <script src="congrats.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Screen Time Buddy — Blocked</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <div class="blocked-page">
    <!-- Character + Ring -->
    <div class="blocked-hero">
      <div class="blocked-ring-container">
        <svg class="blocked-ring" viewBox="0 0 160 160">
          <circle class="ring-bg" cx="80" cy="80" r="70" />
          <circle class="ring-progress" id="blockedRing" cx="80" cy="80" r="70"
            stroke="#FF4D4D" stroke-dasharray="440 440" />
        </svg>
        <div class="blocked-character" id="blockedCharacter"></div>
      </div>
    </div>

    <!-- Title -->
    <h1 class="blocked-title">
      <span id="blockedDomain">This site</span> is blocked
    </h1>

    <!-- Dynamic Message -->
    <div class="message-card" id="messageCard">
      <p id="blockedMessage">You've reached your daily limit. Your future self will thank you for stopping now.</p>
    </div>

    <!-- Stakes Strip -->
    <div class="stakes-strip">
      <div class="stake-item">
        <span class="stake-icon">&#x1F525;</span>
        <span class="stake-label" id="stakeStreak">0 day streak at risk</span>
      </div>
      <div class="stake-divider"></div>
      <div class="stake-item">
        <img src="assets/icons/coin.svg" alt="" class="stake-coin">
        <span class="stake-label" id="stakeCoins">Close now to earn coins</span>
      </div>
    </div>

    <!-- Primary CTA -->
    <button class="cta-primary" id="closeAppBtn">
      <img src="assets/icons/coin.svg" alt="" class="cta-coin">
      <span>Close & Earn Coins</span>
    </button>

    <!-- Secondary Actions -->
    <div class="secondary-actions">
      <button class="cta-secondary" id="struggleBtn">
        <span class="heart-icon">&#x2764;&#xFE0F;</span>
        I'm Struggling
      </button>
    </div>

    <!-- Extend Time (hidden by default) -->
    <div class="extend-panel" id="extendPanel">
      <p class="extend-title">Need more time? Spend coins to extend.</p>
      <div class="extend-options">
        <button class="extend-btn" data-minutes="5" data-cost="1">
          <span class="extend-time">+5m</span>
          <span class="extend-cost">1 coin</span>
        </button>
        <button class="extend-btn" data-minutes="15" data-cost="2">
          <span class="extend-time">+15m</span>
          <span class="extend-cost">2 coins</span>
        </button>
        <button class="extend-btn" data-minutes="30" data-cost="3">
          <span class="extend-time">+30m</span>
          <span class="extend-cost">3 coins</span>
        </button>
      </div>
      <p class="extend-balance">Your balance: <img src="assets/icons/coin.svg" class="inline-coin"> <span id="extendBalance">0</span></p>
    </div>

    <!-- Reset Timer -->
    <div class="reset-timer">
      Resets in <span id="resetTimer">--:--:--</span>
    </div>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
